name: Build

on:
  push:
    paths-ignore:
      - '*.md'
      - '.gitignore'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        config:
          - { name: Linux, os: ubuntu-latest }
          - { name: Windows, os: windows-latest }
          - { name: macOS, os: macos-latest }

    name: Build / ${{ matrix.config.name }} (${{ matrix.build_type }})
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja (Linux)
        if: matrix.config.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: matrix.config.os == 'macos-latest'
        run: brew install ninja

      - name: Install Ninja (Windows)
        if: matrix.config.os == 'windows-latest'
        run: choco upgrade ninja

      - name: Setup MSVC (Windows)
        if: matrix.config.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoundationGameFramework-${{ matrix.config.name }}-${{ matrix.build_type }}
          path: bin/*
          if-no-files-found: error

  package:
    name: Package addon
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: FoundationGameFramework-*
          path: artifacts
          merge-multiple: true

      - name: Assemble addon package
        run: |
          mkdir -p package/addons/FoundationGameFramework
          cp -r src package/addons/FoundationGameFramework/
          cp -r editor package/addons/FoundationGameFramework/
          cp plugin.cfg package/addons/FoundationGameFramework/
          cp FoundationGameFramework.gdextension package/addons/FoundationGameFramework/
          cp heathen_manifest.json package/addons/FoundationGameFramework/
          mkdir -p package/addons/FoundationGameFramework/bin
          cp artifacts/* package/addons/FoundationGameFramework/bin/
          cp README.md package/addons/FoundationGameFramework/
          cp LICENSE package/addons/FoundationGameFramework/
          cd package && zip -r ../FoundationGameFramework.zip addons

      - name: Upload packaged addon
        uses: actions/upload-artifact@v4
        with:
          name: FoundationGameFramework
          path: FoundationGameFramework.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: FoundationGameFramework.zip
