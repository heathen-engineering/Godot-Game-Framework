[plugin]
name="Game Framework Foundation"
description="Godot GDExtension wrap for Heathen Engineering's Game Framework — the engine-agnostic Subsystem/World architecture (inspired by Unreal Engine's Subsystem hierarchy, previously implemented in Unity as com.heathen.gameframework). SubsystemManagerBridge is the single point of contact with Godot's engine/ClassDB; every actual Subsystem/World/GameMode/GameState/PlayerState type is plain, engine-agnostic C++ from the separate Game-Framework core repo (github.com/heathen-engineering/Game-Framework), linked in the same way every other Godot tool built on this foundation links against it — real C++ inheritance, no reflection, no string dispatch. Hosts the Subsystems dock (Project > Subsystems-equivalent: list, enable/disable, health). Open-source under Apache 2.0."
author="Heathen Engineering Limited"
version="1.0.1"
script="editor/FoundationGameFrameworkEditorPlugin.gd"
